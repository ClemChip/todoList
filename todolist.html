<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste de Tâches</title>
    <link rel="stylesheet" href="todolist.css">
</head>

<body>
    <h1>Ma Liste de Tâches</h1>
    <h2 class="explanation-text">Bienvenue sur votre gestionnaire de tâches !</h2>
    <div aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <div class="task-container">
        <ul id="task-list" aria-label="Liste des tâches">       
        </ul>

        <div class="input-zone">
            <input type="text" id="task-input" placeholder="ex : Faire la vaisselle" aria-label="Ajouter une nouvelle tâche">
            <button id="add-btn" aria-label="Ajouter la tâche à la liste">Ajouter</button> 
        </div>
    </div>
    
    <footer>
        <p>Par Prévence</p> 
    </footer>

    <script src="todolist.js"></script>
</body>


</html>
